name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build Windows executable
        run: ./scripts/build-windows.ps1

      - name: Smoke-test executable
        run: npm run test:executable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kr-rnd-preflight-windows-x64
          path: |
            dist/kr-rnd-preflight-windows-x64.exe
            dist/kr-rnd-preflight-windows-x64.zip
            dist/SHA256SUMS.txt
            dist/THIRD_PARTY_LICENSES.txt
          if-no-files-found: error
          retention-days: 7
